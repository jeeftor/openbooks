name: Publish Release Images to GitHub Container Registry

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semver tag to publish, such as v2.0.3
        required: true
        type: string
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
    tags:
      - "v*.*.*"

jobs:
  create-tag:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.next-tag.outputs.tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Next Patch Tag
        id: next-tag
        shell: bash
        run: |
          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.1.0"
          elif [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          else
            echo "Latest semver tag is not in vX.Y.Z format: $latest_tag" >&2
            exit 1
          fi

          git tag "$next_tag" "$GITHUB_SHA"
          git push origin "refs/tags/$next_tag"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - create-tag
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || needs.create-tag.outputs.tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            suffix: ""
          - dockerfile: Dockerfile.calibre
            suffix: -calibre

    steps:
      - name: Resolve Release Tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          CREATED_TAG: ${{ needs.create-tag.outputs.tag }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="$CREATED_TAG"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be in vX.Y.Z format: $release_tag" >&2
            exit 1
          fi

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Resolve Build Metadata
        id: build
        shell: bash
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(git log -1 --format=%cI)" >> "$GITHUB_OUTPUT"

      - name: Set Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ghcr.io/${{ github.repository_owner }}/openbooks-abs
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.tag }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.release.outputs.tag }}
            COMMIT_SHA=${{ steps.build.outputs.commit_sha }}
            BUILD_DATE=${{ steps.build.outputs.build_date }}
